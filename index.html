# 🎓 Универсальный Редактор игры «Тамагочи»

Создаю полнофункциональный редактор с поддержкой 10 языков, всех типов заданий и мультимедиа.

```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎓 Редактор Тамагочи — Универсальный</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F4FF;--card:#fff;
  --pu:#6C3FC8;--pu2:#9B5DE5;--pu3:#EDE9FE;--pu4:#F5F0FF;
  --pk:#E84393;--pk2:#FFB3D9;--pk3:#FCE7F3;
  --gr:#27AE60;--gr2:#B5EAD7;--gr3:#E8F5EE;
  --ye:#D97706;--ye2:#FDE68A;--ye3:#FFFBEB;
  --re:#DC2626;--re2:#FFCDD2;--re3:#FEF2F2;
  --cy:#0891B2;--cy2:#BAE6FD;--cy3:#F0F9FF;
  --or:#EA580C;--or2:#FED7AA;
  --tx:#1E1B4B;--tx2:#6B7280;--tx3:#9CA3AF;
  --sh:0 4px 24px rgba(108,63,200,.15);
  --sh2:0 2px 10px rgba(0,0,0,.08);
  --sh3:0 8px 32px rgba(108,63,200,.2);
  --r:16px;--r2:12px;--r3:8px;
  --fp:'Press Start 2P',monospace;
  --fn:'Nunito',sans-serif;
  --sidebar:280px;
}
html,body{min-height:100%;font-family:var(--fn);background:var(--bg);color:var(--tx);}

/* ═══ LAYOUT ═══ */
.editor-layout{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:auto 1fr;min-height:100vh;}
.top-bar{grid-column:1/-1;background:linear-gradient(135deg,var(--pu),var(--pu2));
  padding:0 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(108,63,200,.3);
  position:sticky;top:0;z-index:200;min-height:56px;flex-wrap:wrap;}
.top-bar-title{font-family:var(--fp);font-size:clamp(8px,1.5vw,11px);color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.3);white-space:nowrap;}
.top-bar-sub{font-size:10px;color:rgba(255,255,255,.75);white-space:nowrap;}
.tb-spacer{flex:1;}
.tb-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);
  border-radius:20px;color:#fff;cursor:pointer;font-family:var(--fn);font-weight:800;
  font-size:11px;padding:6px 14px;transition:all .2s;white-space:nowrap;}
.tb-btn:hover{background:rgba(255,255,255,.28);}
.tb-btn.accent{background:#fff;color:var(--pu);border-color:#fff;}
.tb-btn.accent:hover{background:var(--pu3);}
.tb-btn.danger{background:rgba(220,38,38,.25);border-color:rgba(220,38,38,.5);}

/* ═══ SIDEBAR ═══ */
.sidebar{background:#fff;border-right:2px solid var(--pu3);overflow-y:auto;
  padding:16px 0 40px;position:sticky;top:56px;height:calc(100vh - 56px);}
.sb-section{padding:0 14px;margin-bottom:4px;}
.sb-label{font-family:var(--fp);font-size:7px;color:var(--tx3);text-transform:uppercase;
  letter-spacing:1px;padding:10px 14px 6px;display:block;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r3);
  cursor:pointer;transition:all .18s;font-size:12px;font-weight:800;color:var(--tx2);
  border:none;background:none;width:100%;text-align:left;}
.sb-item:hover{background:var(--pu4);color:var(--pu);}
.sb-item.active{background:var(--pu3);color:var(--pu);}
.sb-item .sb-ico{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.sb-divider{height:1px;background:var(--pu3);margin:8px 14px;}
.sb-badge{background:var(--pk);color:#fff;border-radius:10px;font-size:9px;
  padding:2px 7px;margin-left:auto;font-family:var(--fn);font-weight:900;}

/* ═══ MAIN CONTENT ═══ */
.main-content{padding:20px;overflow-y:auto;}

/* ═══ PANELS / CARDS ═══ */
.panel{background:var(--card);border-radius:var(--r);box-shadow:var(--sh2);
  padding:20px;margin-bottom:16px;border:1.5px solid var(--pu3);}
.panel-title{font-family:var(--fp);font-size:clamp(8px,1.7vw,11px);color:var(--pu);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.panel-sub{font-size:12px;color:var(--tx2);margin-bottom:16px;line-height:1.6;}
.panel.highlight{border-color:var(--pk);background:linear-gradient(135deg,#fff,var(--pk3));}
.panel.success{border-color:var(--gr);background:var(--gr3);}
.panel.warning{border-color:var(--ye);background:var(--ye3);}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;
  background:var(--pu4);border-radius:var(--r2);padding:4px;}
.tab{border:none;background:none;border-radius:var(--r3);color:var(--tx2);cursor:pointer;
  font-family:var(--fn);font-weight:800;font-size:11px;padding:7px 14px;transition:all .2s;}
.tab:hover{color:var(--pu);}
.tab.active{background:#fff;color:var(--pu);box-shadow:var(--sh2);}

/* ═══ FORM ELEMENTS ═══ */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr;}
.form-row.cols1{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:900;color:var(--tx);display:flex;align-items:center;gap:5px;}
.form-label .lbl-hint{font-size:9px;color:var(--tx3);font-weight:700;}
.form-input{background:var(--pu4);border:2px solid var(--pu3);border-radius:var(--r3);
  color:var(--tx);font-family:var(--fn);font-size:13px;font-weight:700;
  padding:9px 12px;outline:none;transition:all .25s;width:100%;}
.form-input:focus{border-color:var(--pu);box-shadow:0 0 0 3px rgba(108,63,200,.12);}
.form-input::placeholder{color:var(--tx3);}
.form-select{appearance:none;background:var(--pu4) url("data:image/svg+xml,%3Csvg viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%236C3FC8'/%3E%3C/svg%3E") no-repeat right 10px center / 10px;
  border:2px solid var(--pu3);border-radius:var(--r3);color:var(--tx);
  font-family:var(--fn);font-size:13px;font-weight:700;padding:9px 32px 9px 12px;
  outline:none;transition:all .25s;width:100%;cursor:pointer;}
.form-select:focus{border-color:var(--pu);box-shadow:0 0 0 3px rgba(108,63,200,.12);}
.form-textarea{background:var(--pu4);border:2px solid var(--pu3);border-radius:var(--r3);
  color:var(--tx);font-family:var(--fn);font-size:13px;font-weight:700;
  padding:9px 12px;outline:none;transition:all .25s;width:100%;resize:vertical;min-height:80px;}
.form-textarea:focus{border-color:var(--pu);box-shadow:0 0 0 3px rgba(108,63,200,.12);}
.range-wrap{display:flex;align-items:center;gap:10px;}
.form-range{flex:1;accent-color:var(--pu);height:6px;cursor:pointer;}
.range-val{font-family:var(--fp);font-size:10px;color:var(--pu);min-width:36px;text-align:right;}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:800;}
.form-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--pu);cursor:pointer;}

/* ═══ LANGUAGE ALPHABET KEYBOARD ═══ */
.lang-keyboard{background:var(--pu4);border:2px solid var(--pu3);border-radius:var(--r2);
  padding:12px;margin:8px 0;}
.lang-kb-title{font-size:10px;font-weight:900;color:var(--pu);margin-bottom:8px;}
.lang-kb-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.lk-btn{background:#fff;border:1.5px solid var(--pu3);border-radius:6px;
  color:var(--tx);cursor:pointer;font-family:var(--fn);font-size:13px;font-weight:700;
  padding:4px 8px;min-width:30px;text-align:center;transition:all .15s;line-height:1.4;}
.lk-btn:hover{background:var(--pu);color:#fff;border-color:var(--pu);}
.lk-btn:active{transform:scale(.88);}
.lk-btn.special{background:var(--pu3);font-size:10px;padding:5px 10px;}
.lk-sep{width:100%;height:1px;background:var(--pu3);margin:4px 0;}

/* ═══ QUESTION CARD ═══ */
.q-card{background:var(--pu4);border:2px solid var(--pu3);border-radius:var(--r2);
  padding:14px;margin-bottom:10px;position:relative;transition:all .2s;}
.q-card:hover{border-color:var(--pu);box-shadow:var(--sh2);}
.q-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.q-num{background:var(--pu);color:#fff;border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fp);
  font-size:8px;flex-shrink:0;}
.q-type-badge{background:var(--pk);color:#fff;border-radius:20px;font-size:9px;
  padding:3px 10px;font-weight:900;}
.q-actions{margin-left:auto;display:flex;gap:5px;}
.q-del-btn{background:var(--re2);border:none;border-radius:6px;color:var(--re);
  cursor:pointer;font-size:11px;padding:4px 8px;transition:all .2s;}
.q-del-btn:hover{background:var(--re);color:#fff;}
.q-move-btn{background:var(--pu3);border:none;border-radius:6px;color:var(--pu);
  cursor:pointer;font-size:11px;padding:4px 8px;transition:all .2s;}
.q-move-btn:hover{background:var(--pu);color:#fff;}
.q-preview{background:#fff;border-radius:var(--r3);padding:8px 12px;
  font-size:12px;color:var(--tx2);line-height:1.5;margin-top:8px;
  border:1px solid var(--pu3);}

/* ═══ ADD QUESTION BUTTON ═══ */
.add-q-btn{background:linear-gradient(135deg,var(--pu),var(--pu2));border:none;
  border-radius:var(--r2);color:#fff;cursor:pointer;font-family:var(--fn);
  font-weight:900;font-size:13px;padding:12px 20px;width:100%;
  transition:all .2s;box-shadow:0 4px 14px rgba(108,63,200,.28);
  display:flex;align-items:center;justify-content:center;gap:8px;}
.add-q-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,63,200,.38);}

/* ═══ MEDIA UPLOAD ═══ */
.media-drop{background:var(--pu4);border:2.5px dashed var(--pu2);border-radius:var(--r2);
  padding:20px;text-align:center;cursor:pointer;transition:all .25s;position:relative;}
.media-drop:hover,.media-drop.drag{background:var(--pu3);border-color:var(--pu);}
.media-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.media-drop .md-ico{font-size:32px;margin-bottom:8px;}
.media-drop .md-txt{font-size:12px;color:var(--tx2);font-weight:700;}
.media-drop .md-sub{font-size:10px;color:var(--tx3);margin-top:4px;}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px;}
.media-item{background:#fff;border:2px solid var(--pu3);border-radius:var(--r3);
  padding:6px;text-align:center;position:relative;overflow:hidden;}
.media-item img,.media-item video{width:100%;height:70px;object-fit:cover;border-radius:5px;display:block;}
.media-item audio{width:100%;margin:4px 0;}
.media-item .mi-name{font-size:9px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;margin-top:3px;}
.media-del{position:absolute;top:3px;right:3px;background:var(--re);border:none;
  border-radius:50%;color:#fff;cursor:pointer;font-size:9px;width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;}
.media-item.audio-item{display:flex;flex-direction:column;justify-content:center;
  min-height:60px;padding:8px;}
.media-item.gif-item img{height:80px;}

/* ═══ STICKER / GIF PICKER ═══ */
.sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:6px;
  max-height:200px;overflow-y:auto;padding:6px;background:var(--pu4);
  border:2px solid var(--pu3);border-radius:var(--r3);margin-top:8px;}
.sticker-btn{background:#fff;border:2px solid transparent;border-radius:8px;
  cursor:pointer;font-size:24px;padding:6px;text-align:center;transition:all .15s;}
.sticker-btn:hover{border-color:var(--pk);transform:scale(1.15);}
.sticker-btn.sel{border-color:var(--pu);background:var(--pu3);}

/* ═══ COLOR PICKER SWATCH ═══ */
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.color-sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:all .15s;box-shadow:var(--sh2);}
.color-sw:hover,.color-sw.sel{border-color:var(--pu);transform:scale(1.2);}

/* ═══ ANSWER OPTIONS ═══ */
.ans-options{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.ans-row{display:flex;align-items:center;gap:8px;}
.ans-correct-radio{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:800;
  color:var(--gr);cursor:pointer;white-space:nowrap;}
.ans-correct-radio input{accent-color:var(--gr);width:14px;height:14px;}
.ans-del-btn{background:var(--re2);border:none;border-radius:6px;color:var(--re);
  cursor:pointer;font-size:12px;padding:4px 8px;flex-shrink:0;}
.ans-add-btn{background:var(--gr3);border:2px dashed var(--gr);border-radius:var(--r3);
  color:var(--gr);cursor:pointer;font-size:11px;font-weight:900;padding:7px;
  width:100%;transition:all .2s;}
.ans-add-btn:hover{background:var(--gr2);}

/* ═══ STATS / ANALYTICS ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:#fff;border:2px solid var(--pu3);border-radius:var(--r2);
  padding:14px;text-align:center;box-shadow:var(--sh2);}
.stat-val{font-family:var(--fp);font-size:clamp(14px,3vw,22px);color:var(--pu);margin-bottom:4px;}
.stat-lbl{font-size:10px;color:var(--tx2);font-weight:700;}
.stat-card.ok-c .stat-val{color:var(--gr);}
.stat-card.err-c .stat-val{color:var(--re);}
.stat-card.pct-c .stat-val{color:var(--ye);}
.progress-bar-wrap{margin:10px 0;}
.pb-label{font-size:11px;font-weight:800;margin-bottom:4px;display:flex;justify-content:space-between;}
.pb-track{height:14px;background:#F3F4F6;border-radius:7px;overflow:hidden;}
.pb-fill{height:100%;border-radius:7px;transition:width .6s ease;}
.pb-fill.ok{background:linear-gradient(90deg,var(--gr),#52C37A);}
.pb-fill.err{background:linear-gradient(90deg,var(--re),#F87171);}
.pb-fill.skip{background:linear-gradient(90deg,var(--ye),#FCD34D);}

/* ═══ PREVIEW AREA ═══ */
.preview-wrap{background:linear-gradient(135deg,#0d0d2b,#1a1a4e);border-radius:var(--r);
  padding:16px;text-align:center;min-height:300px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;}
.preview-pet{font-size:80px;animation:petFloatP 2.5s ease-in-out infinite;}
@keyframes petFloatP{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.preview-question{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);
  border-radius:var(--r2);padding:14px;max-width:400px;width:100%;margin:12px 0;
  color:#fff;font-size:13px;font-weight:700;line-height:1.6;}
.preview-options{display:flex;flex-direction:column;gap:6px;width:100%;max-width:360px;}
.prev-opt{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);
  border-radius:var(--r3);color:#fff;padding:9px 14px;font-size:12px;font-weight:800;
  cursor:pointer;transition:all .2s;text-align:center;}
.prev-opt:hover{background:rgba(255,255,255,.2);}
.prev-opt.correct{background:rgba(39,174,96,.3);border-color:var(--gr);}
.prev-opt.wrong{background:rgba(220,38,38,.2);border-color:var(--re);}

/* ═══ EXPORT / CODE AREA ═══ */
.code-area{background:#1E1B4B;border-radius:var(--r2);padding:16px;
  font-family:'Courier New',monospace;font-size:11px;color:#C4B5FD;
  max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;
  line-height:1.7;border:2px solid var(--pu);}

/* ═══ ALERT / TOAST ═══ */
.toast-wrap{position:fixed;top:70px;right:16px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#fff;border-radius:var(--r2);box-shadow:var(--sh3);
  padding:12px 18px;font-size:12px;font-weight:800;border-left:4px solid var(--pu);
  animation:toastIn .3s cubic-bezier(.34,1.56,.64,1) both;max-width:280px;pointer-events:auto;}
.toast.ok-t{border-color:var(--gr);color:var(--gr);}
.toast.err-t{border-color:var(--re);color:var(--re);}
.toast.info-t{border-color:var(--cy);color:var(--cy);}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:500;
  background:rgba(30,27,75,.6);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal{background:#fff;border-radius:var(--r);box-shadow:var(--sh3);
  max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;}
.modal-title{font-family:var(--fp);font-size:clamp(9px,2vw,13px);color:var(--pu);margin-bottom:14px;}
.modal-close{float:right;background:var(--re2);border:none;border-radius:50%;
  color:var(--re);cursor:pointer;font-size:16px;width:28px;height:28px;
  display:inline-flex;align-items:center;justify-content:center;}

/* ═══ PILLS ═══ */
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--pu3);
  border-radius:20px;color:var(--pu);font-size:10px;font-weight:900;
  padding:4px 10px;white-space:nowrap;}
.pill.green{background:var(--gr2);color:var(--gr);}
.pill.red{background:var(--re2);color:var(--re);}
.pill.yellow{background:var(--ye2);color:var(--ye);}

/* ═══ SEPARATOR ═══ */
.sep{height:1px;background:var(--pu3);margin:16px 0;}

/* ═══ HELP TEXT ═══ */
.help-text{background:var(--cy3);border:1.5px solid var(--cy2);border-radius:var(--r3);
  padding:10px 14px;font-size:11px;color:var(--cy);font-weight:700;margin:8px 0;
  line-height:1.6;}
.warn-text{background:var(--ye3);border:1.5px solid var(--ye2);border-radius:var(--r3);
  padding:10px 14px;font-size:11px;color:var(--ye);font-weight:700;margin:8px 0;}

/* ═══ SECTION VISIBILITY ═══ */
.section-content{display:none;}
.section-content.active{display:block;}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--pu4);}
::-webkit-scrollbar-thumb{background:var(--pu2);border-radius:3px;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .editor-layout{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:-100%;top:56px;height:calc(100vh - 56px);
    z-index:100;transition:left .3s;width:260px;}
  .sidebar.open{left:0;}
  .main-content{padding:12px;}
  .form-row{grid-template-columns:1fr;}
  .form-row.cols3{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-body">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- EDITOR LAYOUT -->
<div class="editor-layout">

  <!-- TOP BAR -->
  <div class="top-bar">
    <button class="tb-btn" id="sb-toggle" onclick="toggleSidebar()" style="display:none;">☰</button>
    <div>
      <div class="top-bar-title">🎓 РЕДАКТОР ТАМАГОЧИ</div>
      <div class="top-bar-sub">Универсальный конструктор образовательных игр</div>
    </div>
    <div class="tb-spacer"></div>
    <button class="tb-btn" onclick="showPreview()">👁 Предпросмотр</button>
    <button class="tb-btn" onclick="saveToLocal()">💾 Сохранить</button>
    <button class="tb-btn" onclick="loadFromLocal()">📂 Загрузить</button>
    <button class="tb-btn accent" onclick="exportGame()">🚀 Экспорт игры</button>
    <button class="tb-btn danger" onclick="resetAll()">🗑 Сброс</button>
  </div>

  <!-- SIDEBAR -->
